name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: >-
          xcodebuild test
          -project SlashSaver.xcodeproj
          -scheme SlashSaver
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
      - name: Build Release
        run: >-
          xcodebuild build
          -project SlashSaver.xcodeproj
          -scheme SlashSaver
          -configuration Release
          -destination 'generic/platform=macOS'
          -derivedDataPath build/CI
          ARCHS='arm64 x86_64'
          ONLY_ACTIVE_ARCH=NO
          CODE_SIGNING_ALLOWED=NO
      - name: Verify universal binary
        run: |
          architectures="$(lipo -archs build/CI/Build/Products/Release/SlashSaver.app/Contents/MacOS/SlashSaver)"
          [[ "$architectures" == *arm64* && "$architectures" == *x86_64* ]]
